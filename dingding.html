<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园周事务 · 管理员全删 + 冲突强制提示</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef2f6;
            margin: 0;
            min-height: 100vh;
            padding: 1.8rem 1.5rem;
            display: flex;
            justify-content: center;
        }
        .app-container {
            max-width: 1800px;
            width: 100%;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #003057;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 0 0 0.25rem 0;
        }
        .subhead {
            color: #1f4d77;
            margin-bottom: 2rem;
            padding-left: 1.2rem;
            border-left: 5px solid #2a73b3;
            background: #e1ecf7;
            border-radius: 0 30px 30px 0;
            line-height: 1.6;
            font-weight: 400;
        }
        .role-badge {
            background: #1f4d77;
            color: white;
            padding: 0.3rem 1.5rem;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-left: 1rem;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 2.2fr;
            gap: 2rem;
            align-items: start;
        }

        /* 左侧部门卡片 */
        .dept-card {
            background: white;
            border-radius: 32px;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 20px 35px rgba(0, 30, 60, 0.08);
        }
        .dept-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #cbddec;
            padding-bottom: 1.2rem;
        }
        .dept-btn {
            background: #eaf1fa;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            color: #1a4a73;
            cursor: pointer;
            font-size: 0.93rem;
        }
        .dept-btn.active {
            background: #1f6191;
            color: white;
        }
        .upload-panel {
            background: #f6fafd;
            border-radius: 24px;
            padding: 1.6rem 1.3rem;
            border: 2px dashed #9fc1dd;
            margin-bottom: 2rem;
        }
        .upload-panel h3 {
            color: #0f4a75;
            margin: 0 0 1.2rem 0;
            font-size: 1.2rem;
        }
        .form-row {
            margin-bottom: 1.1rem;
        }
        .form-row label {
            display: block;
            font-weight: 500;
            color: #1d4e76;
            margin-bottom: 0.3rem;
            font-size: 0.9rem;
        }
        .form-row input, .form-row textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #b9d1e7;
            border-radius: 20px;
            font-size: 0.95rem;
        }
        .time-location {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }
        .btn-primary {
            background: #1d6ca1;
            color: white;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 40px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
        }
        .btn-primary:disabled {
            background: #95b8d1;
            cursor: not-allowed;
            border-bottom: 4px solid #6f8ca3;
        }
        .preview-area {
            background: #f2f8ff;
            border-radius: 24px;
            padding: 1.2rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .preview-item {
            background: white;
            border-radius: 16px;
            padding: 0.9rem 1rem;
            margin-bottom: 0.8rem;
            border-left: 6px solid #3478a8;
        }

        /* ===== 横向周一到周五表格 ===== */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }
        .master-card {
            background: white;
            border-radius: 32px;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 20px 35px rgba(0, 30, 60, 0.08);
            overflow-x: auto;
        }
        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .table-header h2 {
            margin: 0;
            color: #00315a;
            font-weight: 650;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .week-controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .week-btn {
            background: #e3f0fc;
            border: 1px solid #2a6d9c;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            font-weight: 600;
            color: #1e5a83;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .week-btn:hover {
            background: #c7e0fa;
        }
        .week-badge {
            background: #d3e6f7;
            border-radius: 40px;
            padding: 0.3rem 1.3rem;
            color: #135482;
            font-weight: 500;
            font-size: 1rem;
        }
        
        /* 横向表格布局 */
        .weekly-horizontal {
            display: flex;
            gap: 1rem;
            min-width: 1000px;
        }
        
        /* 每个工作日卡片 */
        .weekday-card {
            flex: 1;
            background: #f8fcff;
            border-radius: 20px;
            border: 1px solid #d2e5f5;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-width: 180px;
        }
        
        /* 日期头部 */
        .weekday-header {
            background: #12456b;
            color: white;
            padding: 1rem 0.5rem;
            text-align: center;
            font-weight: 600;
            font-size: 1.2rem;
            border-bottom: 2px solid #0d3450;
        }
        
        /* 时间纵向区域 */
        .weekday-body {
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: white;
            min-height: 400px;
        }
        
        /* 时间槽 - 纵向排列 */
        .time-slot {
            background: #f0f7ff;
            border-radius: 12px;
            padding: 0.6rem;
            border-left: 4px solid #3478a8;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        
        /* 时间显示 */
        .slot-time {
            font-size: 0.8rem;
            font-weight: 600;
            color: #12456b;
            background: #e3f0fc;
            display: inline-block;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            align-self: flex-start;
        }
        
        /* 事项内容 */
        .slot-content {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        
        .event-dept {
            font-size: 0.7rem;
            color: #1f6191;
            background: #e3f0fc;
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 30px;
            width: fit-content;
        }
        
        .event-title {
            font-weight: 600;
            color: #0f3854;
            font-size: 0.9rem;
        }
        
        .event-location {
            font-size: 0.8rem;
            color: #4f6f8a;
        }
        
        .event-desc {
            font-size: 0.75rem;
            color: #666;
        }
        
        .empty-slot {
            color: #aaa;
            text-align: center;
            padding: 1rem;
            font-style: italic;
        }

        /* 冲突提示样式 - 强化版 */
        .conflict-warning {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            display: none;
            font-weight: 500;
        }
        .conflict-warning.show {
            display: block;
            animation: shake 0.3s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .conflict-item {
            margin-top: 0.5rem;
            padding: 0.5rem;
            padding-left: 1rem;
            border-left: 4px solid #dc3545;
            background: white;
            border-radius: 8px;
        }
        .conflict-icon {
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }

        /* 后台面板 */
        .admin-panel {
            background: #ffffffd9;
            border-radius: 28px;
            padding: 1.5rem;
            border: 2px solid #b8d2ed;
        }
        .admin-toolbar {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .admin-select {
            background: white;
            border: 1.5px solid #4583b3;
            border-radius: 40px;
            padding: 0.5rem 1.5rem;
        }
        .admin-btn {
            background: white;
            border: 1.5px solid #2a6d9c;
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
        }
        .admin-btn.danger {
            border-color: #b55a5a;
            color: #a13d3d;
            background: #ffe6e6;
        }
        .admin-btn.danger:hover {
            background: #ffcccc;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: #f3f9ff;
            border-radius: 20px;
            overflow: hidden;
            font-size: 0.9rem;
        }
        .admin-table th {
            background: #4179a3;
            color: white;
            padding: 0.7rem 0.5rem;
        }
        .admin-table td {
            padding: 0.7rem 0.5rem;
            border-bottom: 1px solid #c2daee;
        }
        .admin-table input {
            width: 100%;
            padding: 0.4rem 0.5rem;
            border: 1px solid #aac5e0;
            border-radius: 30px;
        }
        .save-cell, .delete-cell {
            border: none;
            border-radius: 30px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            margin: 0 0.2rem;
        }
        .save-cell {
            background: #2a7faa;
            color: white;
        }
        .delete-cell {
            background: #c06060;
            color: white;
        }
        .permission-message {
            background: #f0f7ff;
            border-radius: 40px;
            padding: 1.5rem;
            text-align: center;
            color: #2a4e72;
        }
        .current-role-indicator {
            background: #c4daf0;
            border-radius: 40px;
            padding: 0.3rem 1.2rem;
        }
    </style>
</head>
<body>
<div class="app-container">
    <header style="display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center;">
            <h1>📋 校园周事务 · 管理员全删 + 强制冲突提示</h1>
            <span class="role-badge" id="globalRoleDisplay">当前部门：办公室（可后台）</span>
        </div>
        <div style="display: flex; gap: 0.8rem;">
            <span class="current-role-indicator">模拟登录：</span>
            <select id="roleSwitcher" style="padding:0.4rem 1rem; border-radius:30px; border:1px solid #1f6191;">
                <option value="办公室" selected>办公室 (可编辑+全删)</option>
                <option value="教务处">教务处</option>
                <option value="学生处">学生处</option>
                <option value="总务处">总务处</option>
                <option value="安稳办">安稳办</option>
                <option value="智创中心">智创中心</option>
            </select>
        </div>
    </header>
    <div class="subhead">
        ⏱️ 默认显示第4周 · 可切换周次<br>
        ⚠️ <strong style="color:#dc3545;">时间冲突强制提示：同一时间段不能添加两个事项</strong>
    </div>

    <div class="dashboard">
        <!-- 左侧 部门卡片 -->
        <div class="dept-card">
            <div class="dept-tabs" id="deptTabs">
                <button class="dept-btn active" data-dept="教务处">📚 教务处</button>
                <button class="dept-btn" data-dept="学生处">🎓 学生处</button>
                <button class="dept-btn" data-dept="总务处">🏗️ 总务处</button>
                <button class="dept-btn" data-dept="办公室">📁 办公室</button>
                <button class="dept-btn" data-dept="安稳办">🛡️ 安稳办</button>
                <button class="dept-btn" data-dept="智创中心">💡 智创中心</button>
            </div>

            <!-- 上传表单 -->
            <div class="upload-panel">
                <h3><span id="currentDeptSpan">教务处</span> · 新增事项（归入当前显示周）</h3>
                
                <!-- 冲突提示区域 - 强化版 -->
                <div id="conflictWarning" class="conflict-warning"></div>
                
                <div class="form-row">
                    <label>📌 事项名称</label>
                    <input type="text" id="titleInput" placeholder="例如：行政协调会">
                </div>
                <div class="time-location">
                    <div class="form-row">
                        <label>⏱️ 时间 (必须包含周几)</label>
                        <input type="text" id="timeInput" placeholder="周一 09:00-11:00" onblur="checkTimeConflict()">
                    </div>
                    <div class="form-row">
                        <label>📍 地点</label>
                        <input type="text" id="locInput" placeholder="办公楼203">
                    </div>
                </div>
                <div class="form-row">
                    <label>📝 备注</label>
                    <textarea id="descInput" placeholder="可填写出席领导等"></textarea>
                </div>
                <button class="btn-primary" id="addEventBtn">➕ 添加至本部门</button>
                <div id="addBtnStatus" style="font-size:0.8rem; margin-top:0.5rem; color:#dc3545;"></div>
            </div>

            <!-- 当前部门预览 -->
            <div style="font-weight: 600; color: #1c5179; margin-bottom: 0.7rem;">📌 当前部门预览</div>
            <div class="preview-area" id="deptPreview"></div>
        </div>

        <!-- 右侧 可切换周次总表 + 后台 -->
        <div class="right-panel">
            <!-- 可切换周次总表 -->
            <div class="master-card">
                <div class="table-header">
                    <h2>
                        📅 全校总表 · 
                        <span class="week-badge" id="weekDisplay">第4周</span>
                        <div class="week-controls">
                            <button class="week-btn" id="prevWeekBtn">← 上一周</button>
                            <button class="week-btn" id="nextWeekBtn">下一周 →</button>
                        </div>
                    </h2>
                </div>
                <div id="weeklyTableContainer">
                    <!-- 动态生成横向表格 -->
                </div>
            </div>

            <!-- 后台编辑面板（带全删选项） -->
            <div id="adminPanelContainer"></div>
        </div>
    </div>
</div>

<script>
    (function(){
        const DEPARTMENTS = ['教务处', '学生处', '总务处', '办公室', '安稳办', '智创中心'];
        const WEEKDAYS = ['周一', '周二', '周三', '周四', '周五'];
        
        // 默认显示第4周
        const DEFAULT_WEEK = 4;
        let currentWeek = DEFAULT_WEEK;
        
        let allEvents = [];
        let currentDept = '教务处';
        let currentRole = '办公室';
        
        // 当前是否有时间冲突
        let hasTimeConflict = false;

        // DOM元素
        const deptBtns = document.querySelectorAll('.dept-btn');
        const currentDeptSpan = document.getElementById('currentDeptSpan');
        const titleInput = document.getElementById('titleInput');
        const timeInput = document.getElementById('timeInput');
        const locInput = document.getElementById('locInput');
        const descInput = document.getElementById('descInput');
        const addBtn = document.getElementById('addEventBtn');
        const addBtnStatus = document.getElementById('addBtnStatus');
        const deptPreview = document.getElementById('deptPreview');
        const weeklyTableContainer = document.getElementById('weeklyTableContainer');
        const weekDisplay = document.getElementById('weekDisplay');
        const prevWeekBtn = document.getElementById('prevWeekBtn');
        const nextWeekBtn = document.getElementById('nextWeekBtn');
        const roleSwitcher = document.getElementById('roleSwitcher');
        const globalRoleDisplay = document.getElementById('globalRoleDisplay');
        const adminPanelContainer = document.getElementById('adminPanelContainer');
        const conflictWarning = document.getElementById('conflictWarning');

        // 更新周显示
        function updateWeekDisplay() {
            weekDisplay.innerText = `第${currentWeek}周`;
        }

        // 判断时间是周几
        function getWeekdayFromTime(timeStr) {
            if (!timeStr) return null;
            for (let day of WEEKDAYS) {
                if (timeStr.includes(day)) {
                    return day;
                }
            }
            return null;
        }

        // 获取当前周事件
        function getCurrentWeekEvents() {
            return allEvents.filter(ev => ev.week === currentWeek);
        }

        // 按周一到周五分组
        function groupEventsByWeekday(events) {
            const grouped = {
                '周一': [],
                '周二': [],
                '周三': [],
                '周四': [],
                '周五': []
            };
            
            events.forEach(ev => {
                const weekday = getWeekdayFromTime(ev.time);
                if (weekday && grouped.hasOwnProperty(weekday)) {
                    grouped[weekday].push(ev);
                }
            });
            
            // 对每个天的事项按时间排序
            for (let day of WEEKDAYS) {
                grouped[day].sort((a, b) => a.time.localeCompare(b.time));
            }
            
            return grouped;
        }

        // ===== 强化版时间冲突检测 =====
        function checkTimeConflict() {
            const time = timeInput.value.trim();
            if (!time) {
                conflictWarning.classList.remove('show');
                hasTimeConflict = false;
                addBtn.disabled = false;
                addBtnStatus.innerText = '';
                return false;
            }

            // 检查时间格式是否包含周几
            const weekday = getWeekdayFromTime(time);
            if (!weekday) {
                conflictWarning.innerHTML = '⚠️ 请在时间中包含周几（如：周一 09:00-11:00）';
                conflictWarning.classList.add('show');
                hasTimeConflict = true;
                addBtn.disabled = true;
                addBtnStatus.innerText = '⛔ 时间格式错误，无法添加';
                return true;
            }

            // 获取当前周的所有事项
            const weekEvents = allEvents.filter(ev => ev.week === currentWeek);
            const sameDayEvents = weekEvents.filter(ev => {
                const evWeekday = getWeekdayFromTime(ev.time);
                return evWeekday === weekday;
            });

            // 检查时间是否冲突（完全匹配）
            const conflictingEvents = sameDayEvents.filter(ev => ev.time === time);

            if (conflictingEvents.length > 0) {
                let conflictHtml = '<span class="conflict-icon">⛔</span> <strong>时间冲突！该时间段已被占用：</strong><br>';
                conflictingEvents.forEach(ev => {
                    conflictHtml += `
                        <div class="conflict-item">
                            <strong>${ev.dept}</strong> · ${ev.title}<br>
                            <small>🕒 ${ev.time} · 📍 ${ev.location}</small>
                            ${ev.desc ? `<br><small>📝 ${ev.desc}</small>` : ''}
                        </div>
                    `;
                });
                conflictHtml += '<br><span style="color:#dc3545;">❗ 请选择其他时间段</span>';
                conflictWarning.innerHTML = conflictHtml;
                conflictWarning.classList.add('show');
                hasTimeConflict = true;
                addBtn.disabled = true;
                addBtnStatus.innerText = '⛔ 时间冲突，无法添加';
                return true;
            } else {
                conflictWarning.classList.remove('show');
                hasTimeConflict = false;
                addBtn.disabled = false;
                addBtnStatus.innerText = '✅ 时间可用';
                return false;
            }
        }

        // 暴露到全局供onblur使用
        window.checkTimeConflict = checkTimeConflict;

        // 渲染左侧预览
        function renderDeptPreview() {
            const filtered = allEvents.filter(ev => ev.dept === currentDept).slice(-8).reverse();
            if (!filtered.length) {
                deptPreview.innerHTML = `<div style="color:#839eb8; text-align:center;">暂无事项</div>`;
                return;
            }
            let html = '';
            filtered.forEach(ev => {
                html += `<div class="preview-item">
                    <strong>${ev.title}</strong>  <span style="background:#e3efff; padding:2px 8px; border-radius:30px;">第${ev.week}周</span><br>
                    <span style="color:#2d5a7a;">🕒 ${ev.time} · ${ev.location}</span>
                    ${ev.desc ? `<br><small>📝 ${ev.desc}</small>` : ''}
                </div>`;
            });
            deptPreview.innerHTML = html;
        }

        // 渲染横向周一到周五表格
        function renderWeeklyTable() {
            const weekEvents = getCurrentWeekEvents();
            const grouped = groupEventsByWeekday(weekEvents);
            
            let html = '<div class="weekly-horizontal">';
            
            for (let day of WEEKDAYS) {
                const dayEvents = grouped[day] || [];
                
                html += `<div class="weekday-card">`;
                html += `<div class="weekday-header">${day}</div>`;
                html += `<div class="weekday-body">`;
                
                if (dayEvents.length === 0) {
                    html += `<div class="empty-slot">暂无事项</div>`;
                } else {
                    dayEvents.forEach(ev => {
                        html += `
                            <div class="time-slot">
                                <span class="slot-time">${ev.time}</span>
                                <div class="slot-content">
                                    <span class="event-dept">${ev.dept}</span>
                                    <span class="event-title">${ev.title}</span>
                                    <span class="event-location">📍 ${ev.location}</span>
                                    ${ev.desc ? `<span class="event-desc">📝 ${ev.desc}</span>` : ''}
                                </div>
                            </div>
                        `;
                    });
                }
                
                html += `</div>`;
                html += `</div>`;
            }
            
            html += '</div>';
            weeklyTableContainer.innerHTML = html;
            updateWeekDisplay();
        }

        // 添加新事件 - 强制无冲突才能添加
        function addEvent() {
            const title = titleInput.value.trim();
            const time = timeInput.value.trim();
            const loc = locInput.value.trim();
            
            if (!title || !time || !loc) {
                alert('请填写事项、时间和地点');
                return;
            }

            // 检查时间是否包含周几
            const weekday = getWeekdayFromTime(time);
            if (!weekday) {
                alert('请在时间中包含周几（如：周一 09:00-11:00）');
                return;
            }

            // 强制检查时间冲突 - 有冲突就不能添加
            const hasConflict = checkTimeConflict();
            if (hasConflict) {
                alert('⛔ 该时间段已有其他事项，请选择其他时间段！');
                return;
            }

            const newEv = {
                id: Date.now() + Math.random(),
                dept: currentDept,
                title: title,
                time: time,
                location: loc,
                desc: descInput.value.trim(),
                week: currentWeek,
            };
            
            allEvents.push(newEv);
            
            // 清空表单
            titleInput.value = ''; 
            timeInput.value = ''; 
            locInput.value = ''; 
            descInput.value = '';
            
            // 隐藏冲突提示
            conflictWarning.classList.remove('show');
            hasTimeConflict = false;
            addBtn.disabled = false;
            addBtnStatus.innerText = '';
            
            renderDeptPreview();
            renderWeeklyTable();
            renderAdminPanelByRole();
        }

        // 切换部门
        function setActiveDept(dept) {
            currentDept = dept;
            currentDeptSpan.innerText = dept;
            deptBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.dept === dept);
            });
            renderDeptPreview();
        }

        // 周次切换
        function goPrevWeek() {
            if (currentWeek > 1) {
                currentWeek--;
                renderWeeklyTable();
                renderAdminPanelByRole();
                // 清空冲突提示
                conflictWarning.classList.remove('show');
                hasTimeConflict = false;
                addBtn.disabled = false;
                addBtnStatus.innerText = '';
            } else {
                alert('已经是第1周了');
            }
        }

        function goNextWeek() {
            currentWeek++;
            renderWeeklyTable();
            renderAdminPanelByRole();
            // 清空冲突提示
            conflictWarning.classList.remove('show');
            hasTimeConflict = false;
            addBtn.disabled = false;
            addBtnStatus.innerText = '';
        }

        // 后台编辑表格
        function renderAdminTable() {
            if (currentRole !== '办公室') return;
            const filterDept = document.getElementById('adminDeptFilter')?.value || '所有部门';
            let events = allEvents.filter(ev => ev.week === currentWeek);
            if (filterDept !== '所有部门') {
                events = events.filter(ev => ev.dept === filterDept);
            }
            
            const tbody = document.getElementById('adminTbody');
            if (!tbody) return;
            
            if (events.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-admin">暂无匹配事项</td></tr>`;
                return;
            }
            
            let rows = '';
            events.forEach(ev => {
                rows += `<tr data-id="${ev.id}">
                    <td><input type="text" value="${ev.dept}" style="width:85px;" disabled></td>
                    <td><input type="text" value="${ev.title}" class="admin-title"></td>
                    <td><input type="text" value="${ev.time}" class="admin-time"></td>
                    <td><input type="text" value="${ev.location}" class="admin-loc"></td>
                    <td><input type="text" value="${ev.desc || ''}" class="admin-desc"></td>
                    <td>
                        <button class="save-cell" data-id="${ev.id}">保存</button>
                        <button class="delete-cell" data-id="${ev.id}">删除</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = rows;

            document.querySelectorAll('.save-cell').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (currentRole !== '办公室') return;
                    const id = parseFloat(btn.dataset.id);
                    const row = btn.closest('tr');
                    const titleInp = row.querySelector('.admin-title').value.trim();
                    const timeInp = row.querySelector('.admin-time').value.trim();
                    const locInp = row.querySelector('.admin-loc').value.trim();
                    const descInp = row.querySelector('.admin-desc').value.trim();
                    
                    if (!titleInp || !timeInp || !locInp) { 
                        alert('事项,时间,地点不能为空'); 
                        return;
                    }
                    
                    const event = allEvents.find(ev => ev.id === id);
                    if (event) {
                        event.title = titleInp;
                        event.time = timeInp;
                        event.location = locInp;
                        event.desc = descInp;
                        renderWeeklyTable();
                        renderDeptPreview();
                        renderAdminTable(); 
                    }
                });
            });
            
            document.querySelectorAll('.delete-cell').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (currentRole !== '办公室') return;
                    const id = parseFloat(btn.dataset.id);
                    allEvents = allEvents.filter(ev => ev.id !== id);
                    renderWeeklyTable();
                    renderDeptPreview();
                    renderAdminTable();
                });
            });
        }

        // 管理员全删功能
        function deleteAllCurrentWeek() {
            if (currentRole !== '办公室') return;
            
            const filterDept = document.getElementById('adminDeptFilter')?.value || '所有部门';
            let toDelete = allEvents.filter(ev => ev.week === currentWeek);
            
            if (filterDept !== '所有部门') {
                toDelete = toDelete.filter(ev => ev.dept === filterDept);
            }
            
            if (toDelete.length === 0) {
                alert('当前没有可删除的事项');
                return;
            }
            
            const deptText = filterDept === '所有部门' ? '所有部门' : filterDept;
            const confirmMsg = `确定要删除第${currentWeek}周 ${deptText} 的全部 ${toDelete.length} 个事项吗？\n此操作不可撤销！`;
            
            if (confirm(confirmMsg)) {
                const idsToDelete = new Set(toDelete.map(ev => ev.id));
                allEvents = allEvents.filter(ev => !idsToDelete.has(ev.id));
                renderWeeklyTable();
                renderDeptPreview();
                renderAdminTable();
                alert(`已删除第${currentWeek}周 ${deptText} 的 ${toDelete.length} 个事项`);
            }
        }

        // 根据角色渲染后台面板（带全删按钮）
        function renderAdminPanelByRole() {
            if (currentRole === '办公室') {
                adminPanelContainer.innerHTML = `
                    <div class="admin-panel">
                        <h3>⚙️ 办公室 · 编辑第${currentWeek}周事项</h3>
                        <div class="admin-toolbar">
                            <select id="adminDeptFilter" class="admin-select">
                                <option value="所有部门">所有部门</option>
                                ${DEPARTMENTS.map(d => `<option value="${d}">${d}</option>`).join('')}
                            </select>
                            <button class="admin-btn" id="refreshAdminBtn">刷新</button>
                            <button class="admin-btn danger" id="deleteAllBtn">🗑️ 全删当前筛选</button>
                        </div>
                        <table class="admin-table">
                            <thead><tr><th>部门</th><th>事项</th><th>时间</th><th>地点</th><th>备注</th><th>操作</th></tr></thead>
                            <tbody id="adminTbody"></tbody>
                        </table>
                        <p style="font-size:0.8rem; color:#dc3545; margin-top:0.5rem;">⚠️ 全删操作不可撤销，请谨慎使用</p>
                    </div>
                `;
                document.getElementById('refreshAdminBtn')?.addEventListener('click', renderAdminTable);
                document.getElementById('adminDeptFilter')?.addEventListener('change', renderAdminTable);
                document.getElementById('deleteAllBtn')?.addEventListener('click', deleteAllCurrentWeek);
                renderAdminTable();
            } else {
                adminPanelContainer.innerHTML = `
                    <div class="admin-panel permission-message">
                        🔒 您以 <strong>${currentRole}</strong> 身份登录，只有办公室可以编辑
                    </div>
                `;
            }
        }

        // 示例数据（包含多个周的数据）
        function addSamples() {
            const samples = [
                // 第4周数据
                { dept:'教务处', title:'教学例会', time:'周一 10:00-11:30', location:'教务处会议室', desc:'各科长参加', week:4 },
                { dept:'教务处', title:'期中考试筹备', time:'周三 14:00-16:00', location:'行政楼201', desc:'确定考场', week:4 },
                { dept:'学生处', title:'奖学金评审', time:'周二 09:00-11:00', location:'活动中心302', desc:'带打分表', week:4 },
                { dept:'学生处', title:'心理健康讲座', time:'周四 15:00-17:00', location:'图书馆报告厅', desc:'全体心理委员', week:4 },
                { dept:'总务处', title:'食堂卫生检查', time:'周三 08:30-10:00', location:'各食堂', desc:'后勤小组集合', week:4 },
                { dept:'办公室', title:'行政协调会', time:'周四 13:30-15:00', location:'办公楼501', desc:'校办牵头', week:4 },
                { dept:'安稳办', title:'消防演练', time:'周五 15:00-17:00', location:'操场', desc:'全体师生', week:4 },
                { dept:'智创中心', title:'大创项目申报', time:'周五 09:00-11:30', location:'创新楼203', desc:'导师指导', week:4 },
                
                // 第3周数据
                { dept:'教务处', title:'教学计划会', time:'周一 14:00-15:30', location:'教务处', desc:'教学院长参加', week:3 },
                { dept:'学生处', title:'迎新筹备', time:'周二 10:00-11:30', location:'活动中心', desc:'志愿者招募', week:3 },
                { dept:'总务处', title:'设施检修', time:'周三 09:00-11:00', location:'教学楼', desc:'空调维修', week:3 },
                
                // 第5周数据
                { dept:'教务处', title:'教学检查', time:'周一 09:00-11:00', location:'各教室', desc:'听课安排', week:5 },
                { dept:'学生处', title:'社团招新', time:'周三 14:00-17:00', location:'操场', desc:'百团大战', week:5 },
                { dept:'办公室', title:'档案整理', time:'周四 09:00-11:00', location:'档案室', desc:'年度归档', week:5 }
            ];
            samples.forEach(s => {
                allEvents.push({ ...s, id: Date.now() + Math.random() * 1000 });
            });
            renderWeeklyTable();
            renderDeptPreview();
        }

        // 角色切换
        function switchRole(role) {
            currentRole = role;
            globalRoleDisplay.innerText = `当前部门：${role} ${role === '办公室' ? '（可编辑+全删）' : '（只读）'}`;
            renderAdminPanelByRole();
        }

        // 绑定事件
        deptBtns.forEach(btn => {
            btn.addEventListener('click', () => setActiveDept(btn.dataset.dept));
        });
        addBtn.addEventListener('click', addEvent);
        prevWeekBtn.addEventListener('click', goPrevWeek);
        nextWeekBtn.addEventListener('click', goNextWeek);
        roleSwitcher.addEventListener('change', (e) => switchRole(e.target.value));

        // 时间输入框实时检测冲突
        timeInput.addEventListener('blur', checkTimeConflict);
        timeInput.addEventListener('input', () => {
            conflictWarning.classList.remove('show');
            hasTimeConflict = false;
            addBtn.disabled = false;
            addBtnStatus.innerText = '';
        });

        // 初始化
        setActiveDept('教务处');
        addSamples();
        switchRole('办公室');
        updateWeekDisplay();
    })();
</script>
